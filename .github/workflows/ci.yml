name: medify-ci
on:
  push:
  pull_request:
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip, cache-dependency-path: apps/api/requirements.txt }
      - run: pip install -r apps/api/requirements.txt
      - run: PYTHONPATH=apps/api pytest -q apps/api/tests
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: apps/web/package.json }
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
